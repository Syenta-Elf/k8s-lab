apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-lab
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Syenta-Elf/k8s-lab.git
    targetRevision: HEAD
    path: k8s-lab-chart
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy: {}
