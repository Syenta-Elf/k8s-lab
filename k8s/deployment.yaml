apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-lab
  template:
    metadata:
      labels:
        app: k8s-lab
    spec:
      containers:
        - name: k8s-lab
          image: k8s-lab:v1
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
